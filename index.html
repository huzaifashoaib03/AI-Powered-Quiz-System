<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart AI Quiz System</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✨</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="error-toast"></div>

<div id="app">
  <!-- Card Section -->
  <div id="config-screen" class="card">
    <div class="logo">⚡ QUIZAI</div>
    <div class="subtitle">Smart AI Quiz System</div>
    <div class="form-group"><label>Subject Name</label><input type="text" id="subject" placeholder="e.g. Computer Science" /></div>
    <div class="form-group"><label>Topic</label><input type="text" id="topic" placeholder="e.g. Data Structures" /></div>
    <div class="form-group"><label>Number of Questions</label><input type="number" id="num-questions" min="1" max="20" value="5" /></div>
    <div class="form-group">
      <label>Difficulty Level</label>
      <select id="difficulty">
        <option value="Easy">Easy</option>
        <option value="Medium" selected>Medium</option>
        <option value="Hard">Hard</option>
      </select>
    </div>
    <div class="divider"></div>
    <button class="btn btn-primary" onclick="startQuiz()">GENERATE QUIZ →</button>
  </div>

  <!-- Loader, Quiz, and Result screens stay inside #app for centering -->
  <div id="loader-screen" class="card hidden">...</div>
  <div id="quiz-screen" class="card hidden">...</div>
  <div id="result-screen" class="card hidden">...</div>

  <!-- Copyright Text Right Below Card -->
  <div class="copyright-tag">
    Developed with ❤️ by <a href="https://www.linkedin.com/in/huzaifashoaib03/" target="_blank">Huzaifa Shoaib</a>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
